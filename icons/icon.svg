<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#6c5ce7"/>
  <!-- Back card -->
  <rect x="140" y="100" width="260" height="180" rx="16" fill="#fff" opacity=".3" transform="rotate(6 270 190)"/>
  <!-- Front card -->
  <rect x="120" y="110" width="260" height="180" rx="16" fill="#fff"/>
  <!-- Question mark -->
  <text x="250" y="225" font-family="sans-serif" font-size="100" font-weight="bold" fill="#6c5ce7" text-anchor="middle">?</text>
  <!-- Label -->
  <text x="256" y="370" font-family="sans-serif" font-size="48" font-weight="700" fill="#fff" text-anchor="middle">FLASH</text>
  <text x="256" y="420" font-family="sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,.7)" text-anchor="middle">CARDS</text>
</svg>
